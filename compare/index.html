<!doctype html>
<html lang="zh-Hant" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="兰亭序逐字对比——点击任意一字，并列查看神龙本、褚摹本、虞摹本、定武本的字形。" />
    <title>逐字对比 · 兰亭序</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css?v=2" />
    <script src="/theme.js"></script>
  </head>
  <body>

    <!-- 顶栏 -->
    <header class="topbar">
      <div class="topbar__inner">
        <a href="/" class="topbar__back" aria-label="返回首页">← 蘭亭序</a>
        <span class="topbar__page-title">逐字对比</span>
        <button class="topbar__theme-btn" type="button" onclick="ltToggleTheme()" aria-label="切换主题">
          <span class="topbar__theme-icon"></span>
        </button>
      </div>
    </header>

    <!-- 搜索栏 -->
    <div class="lt-search" id="lt-search">
      <input type="text" class="lt-search__input" id="lt-search-input"
             placeholder="搜索文字…" maxlength="10" aria-label="搜索文字">
      <span class="lt-search__count" id="lt-search-count"></span>
      <button class="lt-search__btn" id="lt-search-prev" type="button" aria-label="上一个" disabled>▲</button>
      <button class="lt-search__btn" id="lt-search-next" type="button" aria-label="下一个" disabled>▼</button>
      <button class="lt-search__btn lt-search__btn--clear" id="lt-search-clear" type="button" aria-label="清除" style="display:none">×</button>
    </div>

    <!-- 卷轴区：由 main.js 填充 -->
    <div id="lt-scroll" class="lt-scroll" role="region" aria-label="兰亭序全文"></div>

    <!-- 对比面板：由 main.js 填充 -->
    <div id="lt-panel" class="lt-panel" role="complementary" aria-label="字形对比" aria-live="polite"></div>

    <!-- 版本说明 -->
    <footer class="lt-footer">
      <p class="lt-footer__note">
        关于神龙本：业界有观点认为此本肥软散媚、气不贯通，描摹痕迹极重，笔画先后层次不清（如「述」字撇被竖挡住），实际水准较低，或为明代复刻作品，非唐摹真迹。参考：<a href="https://www.bilibili.com/video/BV1sMSQBkEkU" target="_blank" rel="noopener">王羲之到底好在哪</a>
      </p>
      <p class="lt-footer__note">
        褚摹本、虞摹本、定武本的逐字图暂缺，待高清源图手工标注后补充。
      </p>
    </footer>

    <script src="/data/lanting-data.js"></script>
    <script src="/main.js?v=2"></script>
    <script src="/lightbox.js"></script>
  </body>
</html>
